<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | OnMyWay Miami</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos específicos para la grilla de autos */
        .inventory-container {
            padding: 120px 10% 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        .car-card {
            background: #1a1a1c;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #333;
        }
        .car-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
        }
        .car-img {
            width: 100%;
            height: 200px;
            background-color: #333; /* Placeholder */
            object-fit: cover;
        }
        .car-info {
            padding: 20px;
        }
        .car-info h2 {
            color: var(--primary);
            font-size: 1.4rem;
            margin-bottom: 10px;
        }
        .car-details {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #bbb;
            margin-bottom: 15px;
        }
        .price-tag {
            font-weight: bold;
            color: var(--secondary);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">OnMyWay</div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="inventory.html" class="active">Inventario</a></li>
            <li><a href="contact.html">Contacto</a></li>
        </ul>
    </nav>

    <section class="inventory-container">
        <div class="car-card">
            <img src="https://images.unsplash.com/photo-1584345604480-8347cc996c5f?auto=format&fit=crop&w=500&q=60" alt="Mustang" class="car-img">
            <div class="car-info">
                <h2>Ford Mustang Convertible</h2>
                <div class="car-details">
                    <span>4 Pasajeros</span>
                    <span>Automático</span>
                </div>
                <p class="price-tag">$99 / día</p>
                <a href="contact.html" class="btn-primary" style="display:block; text-align:center; padding: 10px;">Reservar</a>
            </div>
        </div>

        <div class="car-card">
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=500&q=60" alt="Porsche" class="car-img">
            <div class="car-info">
                <h2>Porsche 911 Carrera</h2>
                <div class="car-details">
                    <span>2 Pasajeros</span>
                    <span>Deportivo</span>
                </div>
                <p class="price-tag">$250 / día</p>
                <a href="contact.html" class="btn-primary" style="display:block; text-align:center; padding: 10px;">Reservar</a>
            </div>
        </div>

        <div class="car-card">
            <img src="https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?auto=format&fit=crop&w=500&q=60" alt="Escalade" class="car-img">
            <div class="car-info">
                <h2>Cadillac Escalade SUV</h2>
                <div class="car-details">
                    <span>7 Pasajeros</span>
                    <span>Luxury Full</span>
                </div>
                <p class="price-tag">$180 / día</p>
                <a href="contact.html" class="btn-primary" style="display:block; text-align:center; padding: 10px;">Reservar</a>
            </div>
        </div>
    </section>

</body>
</html>
