<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | OnMyWay Miami</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos específicos para la grilla de autos */
        .inventory-container {
            padding: 120px 10% 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        .car-card {
            background: #1a1a1c;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #333;
        }
        .car-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
        }
        .car-img {
            width: 100%;
            height: 200px;
            background-color: #333; /* Placeholder */
            object-fit: cover;
        }
        .car-info {
            padding: 20px;
        }
        .car-info h2 {
            color: var(--primary);
            font-size: 1.4rem;
            margin-bottom: 10px;
        }
        .car-details {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #bbb;
            margin-bottom: 15px;
        }
        .price-tag {
            font-weight: bold;
            color: var(--secondary);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <site-header></site-header>

    <section class="inventory-container">
        <div class="car-card">
            <img src="https://d24naddg1rhy2p.cloudfront.net/273321/22/0/1%2520economy%2520.png" class="car-img">
            <div class="car-info">
                <h2>Hyundai Elantra</h2>
                <div class="car-details">
                    <span>4 Pasajeros</span>
                    <span>Automático</span>
                </div>
                <p class="price-tag">$55 / día</p>
                <a href="contact.html" class="btn-primary" style="display:block; text-align:center; padding: 10px;">Reservar</a>
            </div>
        </div>

        <div class="car-card">
            <img src="https://cdn.motor1.com/images/mgl/Oo11eY/s1/2023-mitsubishi-outlander-phev.webp" alt="Mitsubishi" class="car-img">
            <div class="car-info">
                <h2>Mitsubishi Outlander</h2>
                <div class="car-details">
                    <span>5 Pasajeros</span>
                    <span>SUV</span>
                </div>
                <p class="price-tag">$75 / día</p>
                <a href="contact.html" class="btn-primary" style="display:block; text-align:center; padding: 10px;">Reservar</a>
            </div>
        </div>

        <div class="car-card">
            <img src="https://d24naddg1rhy2p.cloudfront.net/273321/27/0/3%2520caravan%2520.png" alt="Caravan" class="car-img">
            <div class="car-info">
                <h2>Dodge Caravan</h2>
                <div class="car-details">
                    <span>7 Pasajeros</span>
                    <span>Caravans</span>
                </div>
                <p class="price-tag">$75 / día</p>
                <a href="contact.html" class="btn-primary" style="display:block; text-align:center; padding: 10px;">Reservar</a>
            </div>
        </div>

         <div class="car-card">
            <img src="https://d24naddg1rhy2p.cloudfront.net/273321/35/1000/4%2520lujo.png" alt="Mustang" class="car-img">
            <div class="car-info">
                <h2>Mustang Convertible</h2>
                <div class="car-details">
                    <span>4 Pasajeros</span>
                    <span>Luxury</span>
                </div>
                <p class="price-tag">$110 / día</p>
                <a href="contact.html" class="btn-primary" style="display:block; text-align:center; padding: 10px;">Reservar</a>
            </div>
        </div>
    
    </section>

    <site-footer></site-footer>

    <script src="scripts.js"></script>
</body>
</html>
